name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kyvik
          POSTGRES_PASSWORD: kyvik
          POSTGRES_DB: kyvik_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      KYVIK_TEST_DSN: "postgres://kyvik:kyvik@localhost:5432/kyvik_test?sslmode=disable"
      KYVIK_SKIP_BROWSER_TESTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -p 1 -count=1 -timeout 600s ./...

      - name: Run integration tests
        env:
          KYVIK_TEST_POSTGRES_DSN: "postgres://kyvik:kyvik@localhost:5432/kyvik_test?sslmode=disable"
        run: go test -tags integration -p 1 -count=1 -timeout 120s ./internal/store/postgres/...
