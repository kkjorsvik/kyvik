name: system-auditor
version: "1.0.0"
description: Host system inspection, security posture analysis, and log analysis
author: kyvik
license: Apache-2.0
required_tools:
  - hostfs
  - shell
  - memory
required_capabilities:
  - tool: filesystem
    action: read
    resource: "*"
  - tool: shell
    action: execute
    resource: "*"
  - tool: memory
    action: read
    resource: "*"
  - tool: memory
    action: write
    resource: "*"
