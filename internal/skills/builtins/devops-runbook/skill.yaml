name: devops-runbook
version: "1.0.0"
description: Safe operational procedures with check-act-verify loops and incident response
author: kyvik
license: Apache-2.0
required_tools:
  - shell
  - file
  - memory
required_capabilities:
  - tool: shell
    action: execute
    resource: "*"
  - tool: filesystem
    action: read
    resource: "*"
  - tool: filesystem
    action: write
    resource: "*"
  - tool: memory
    action: read
    resource: "*"
  - tool: memory
    action: write
    resource: "*"
