name: web-researcher
version: "1.0.0"
description: Browser-based research methodology with source evaluation and cross-referencing
author: kyvik
license: Apache-2.0
required_tools:
  - browser
  - file
  - memory
required_capabilities:
  - tool: filesystem
    action: read
    resource: "*"
  - tool: filesystem
    action: write
    resource: "*"
  - tool: memory
    action: read
    resource: "*"
  - tool: memory
    action: write
    resource: "*"
sandbox:
  allow_network: true
